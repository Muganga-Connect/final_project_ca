<svg width="100%" viewBox="0 0 1200 1000" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>MugangaConnect+ Class Diagram</title>
  <desc>Class diagram showing the main classes and relationships in MugangaConnect+ system.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="diamond" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 5 L5 2 L10 5 L5 8 Z" fill="white" stroke="context-stroke" stroke-width="1.2"/>
    </marker>
    <marker id="triangle" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0 5 L10 0 L10 10 Z" fill="white" stroke="context-stroke" stroke-width="1.2"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.12)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="1000" fill="rgb(252,252,250)"/>

  <!-- ══════════════════════════════════════
       TITLE
  ══════════════════════════════════════ -->
  <text x="600" y="42" text-anchor="middle"
    style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:26px;font-weight:800;">
    MugangaConnect+ — Class Diagram
  </text>
  <text x="600" y="68" text-anchor="middle"
    style="fill:rgb(100,99,96);font-family:'Segoe UI',sans-serif;font-size:15px;">
    Core Domain Model
  </text>

  <!-- ══════════════════════════════════════
       CLASS: Patient (top left)
  ══════════════════════════════════════ -->
  <rect x="40" y="110" width="280" height="240" rx="8"
    fill="white" stroke="rgb(83,74,183)" stroke-width="1.6" filter="url(#shadow)"/>
  <!-- header -->
  <rect x="40" y="110" width="280" height="44" rx="8"
    fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1.6"/>
  <rect x="40" y="132" width="280" height="22" fill="rgb(238,237,254)"/>
  <text x="180" y="138" text-anchor="middle"
    style="fill:rgb(60,52,137);font-family:'Segoe UI',sans-serif;font-size:18px;font-weight:700;">
    Patient
  </text>
  <!-- divider -->
  <line x1="40" y1="154" x2="320" y2="154" stroke="rgb(83,74,183)" stroke-width="1.2"/>
  <!-- attributes -->
  <text x="52" y="178" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - patientId: String
  </text>
  <text x="52" y="202" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - name: String
  </text>
  <text x="52" y="226" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - email: String
  </text>
  <text x="52" y="250" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - phone: String
  </text>
  <text x="52" y="274" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - biometricEnabled: Boolean
  </text>
  <!-- divider -->
  <line x1="40" y1="288" x2="320" y2="288" stroke="rgb(83,74,183)" stroke-width="1.2"/>
  <!-- methods -->
  <text x="52" y="312" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    + login(): Boolean
  </text>
  <text x="52" y="336" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    + bookAppointment(): void
  </text>

  <!-- ══════════════════════════════════════
       CLASS: Appointment (top center)
  ══════════════════════════════════════ -->
  <rect x="380" y="110" width="280" height="290" rx="8"
    fill="white" stroke="rgb(15,110,86)" stroke-width="1.6" filter="url(#shadow)"/>
  <!-- header -->
  <rect x="380" y="110" width="280" height="44" rx="8"
    fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="1.6"/>
  <rect x="380" y="132" width="280" height="22" fill="rgb(225,245,238)"/>
  <text x="520" y="138" text-anchor="middle"
    style="fill:rgb(8,80,65);font-family:'Segoe UI',sans-serif;font-size:18px;font-weight:700;">
    Appointment
  </text>
  <!-- divider -->
  <line x1="380" y1="154" x2="660" y2="154" stroke="rgb(15,110,86)" stroke-width="1.2"/>
  <!-- attributes -->
  <text x="392" y="178" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - appointmentId: String
  </text>
  <text x="392" y="202" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - patientId: String
  </text>
  <text x="392" y="226" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - date: Date
  </text>
  <text x="392" y="250" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - time: Time
  </text>
  <text x="392" y="274" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - status: String
  </text>
  <text x="392" y="298" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - riskScore: Float
  </text>
  <!-- divider -->
  <line x1="380" y1="312" x2="660" y2="312" stroke="rgb(15,110,86)" stroke-width="1.2"/>
  <!-- methods -->
  <text x="392" y="336" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    + create(): void
  </text>
  <text x="392" y="360" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    + reschedule(): void
  </text>
  <text x="392" y="384" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    + cancel(): void
  </text>

  <!-- ══════════════════════════════════════
       CLASS: Reminder (top right)
  ══════════════════════════════════════ -->
  <rect x="720" y="110" width="280" height="240" rx="8"
    fill="white" stroke="rgb(133,79,11)" stroke-width="1.6" filter="url(#shadow)"/>
  <!-- header -->
  <rect x="720" y="110" width="280" height="44" rx="8"
    fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="1.6"/>
  <rect x="720" y="132" width="280" height="22" fill="rgb(250,238,218)"/>
  <text x="860" y="138" text-anchor="middle"
    style="fill:rgb(99,56,6);font-family:'Segoe UI',sans-serif;font-size:18px;font-weight:700;">
    Reminder
  </text>
  <!-- divider -->
  <line x1="720" y1="154" x2="1000" y2="154" stroke="rgb(133,79,11)" stroke-width="1.2"/>
  <!-- attributes -->
  <text x="732" y="178" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - reminderId: String
  </text>
  <text x="732" y="202" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - appointmentId: String
  </text>
  <text x="732" y="226" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - scheduledTime: DateTime
  </text>
  <text x="732" y="250" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - message: String
  </text>
  <text x="732" y="274" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - sent: Boolean
  </text>
  <!-- divider -->
  <line x1="720" y1="288" x2="1000" y2="288" stroke="rgb(133,79,11)" stroke-width="1.2"/>
  <!-- methods -->
  <text x="732" y="312" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    + schedule(): void
  </text>
  <text x="732" y="336" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    + send(): void
  </text>

  <!-- ══════════════════════════════════════
       CLASS: AppointmentHistory (bottom left)
  ══════════════════════════════════════ -->
  <rect x="40" y="480" width="280" height="240" rx="8"
    fill="white" stroke="rgb(15,110,86)" stroke-width="1.6" filter="url(#shadow)"/>
  <!-- header -->
  <rect x="40" y="480" width="280" height="44" rx="8"
    fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="1.6"/>
  <rect x="40" y="502" width="280" height="22" fill="rgb(225,245,238)"/>
  <text x="180" y="508" text-anchor="middle"
    style="fill:rgb(8,80,65);font-family:'Segoe UI',sans-serif;font-size:18px;font-weight:700;">
    AppointmentHistory
  </text>
  <!-- divider -->
  <line x1="40" y1="524" x2="320" y2="524" stroke="rgb(15,110,86)" stroke-width="1.2"/>
  <!-- attributes -->
  <text x="52" y="548" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - historyId: String
  </text>
  <text x="52" y="572" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - patientId: String
  </text>
  <text x="52" y="596" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - appointmentId: String
  </text>
  <text x="52" y="620" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - status: String
  </text>
  <text x="52" y="644" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - completedDate: Date
  </text>
  <!-- divider -->
  <line x1="40" y1="658" x2="320" y2="658" stroke="rgb(15,110,86)" stroke-width="1.2"/>
  <!-- methods -->
  <text x="52" y="682" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    + markAttended(): void
  </text>
  <text x="52" y="706" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    + markMissed(): void
  </text>

  <!-- ══════════════════════════════════════
       CLASS: AIEngine (bottom center)
  ══════════════════════════════════════ -->
  <rect x="380" y="480" width="280" height="240" rx="8"
    fill="white" stroke="rgb(133,79,11)" stroke-width="1.6" filter="url(#shadow)"/>
  <!-- header -->
  <rect x="380" y="480" width="280" height="44" rx="8"
    fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="1.6"/>
  <rect x="380" y="502" width="280" height="22" fill="rgb(250,238,218)"/>
  <text x="520" y="508" text-anchor="middle"
    style="fill:rgb(99,56,6);font-family:'Segoe UI',sans-serif;font-size:18px;font-weight:700;">
    AIEngine
  </text>
  <!-- divider -->
  <line x1="380" y1="524" x2="660" y2="524" stroke="rgb(133,79,11)" stroke-width="1.2"/>
  <!-- attributes -->
  <text x="392" y="548" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - modelVersion: String
  </text>
  <text x="392" y="572" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - threshold: Float
  </text>
  <!-- divider -->
  <line x1="380" y1="586" x2="660" y2="586" stroke="rgb(133,79,11)" stroke-width="1.2"/>
  <!-- methods -->
  <text x="392" y="610" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    + predictNoShow(history): Float
  </text>
  <text x="392" y="634" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    + analyzePattern(): void
  </text>
  <text x="392" y="658" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    + updateReminderFrequency(): void
  </text>

  <!-- ══════════════════════════════════════
       CLASS: NotificationService (bottom right)
  ══════════════════════════════════════ -->
  <rect x="720" y="480" width="280" height="240" rx="8"
    fill="white" stroke="rgb(133,79,11)" stroke-width="1.6" filter="url(#shadow)"/>
  <!-- header -->
  <rect x="720" y="480" width="280" height="44" rx="8"
    fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="1.6"/>
  <rect x="720" y="502" width="280" height="22" fill="rgb(250,238,218)"/>
  <text x="860" y="508" text-anchor="middle"
    style="fill:rgb(99,56,6);font-family:'Segoe UI',sans-serif;font-size:18px;font-weight:700;">
    NotificationService
  </text>
  <!-- divider -->
  <line x1="720" y1="524" x2="1000" y2="524" stroke="rgb(133,79,11)" stroke-width="1.2"/>
  <!-- attributes -->
  <text x="732" y="548" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - fcmToken: String
  </text>
  <text x="732" y="572" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    - apiKey: String
  </text>
  <!-- divider -->
  <line x1="720" y1="586" x2="1000" y2="586" stroke="rgb(133,79,11)" stroke-width="1.2"/>
  <!-- methods -->
  <text x="732" y="610" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    + sendPushNotification(): void
  </text>
  <text x="732" y="634" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    + scheduleReminder(): void
  </text>
  <text x="732" y="658" style="fill:rgb(20,20,19);font-family:'Segoe UI',sans-serif;font-size:14px;">
    + cancelReminder(): void
  </text>

  <!-- ══════════════════════════════════════
       RELATIONSHIPS
  ══════════════════════════════════════ -->

  <!-- Patient → Appointment (1 to many) -->
  <line x1="320" y1="230" x2="380" y2="230"
    stroke="rgb(61,61,58)" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="330" y="222" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:13px;">1</text>
  <text x="360" y="222" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:13px;">*</text>
  <text x="330" y="250" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:12px;">books</text>

  <!-- Appointment → Reminder (1 to many) -->
  <line x1="660" y1="230" x2="720" y2="230"
    stroke="rgb(61,61,58)" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="670" y="222" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:13px;">1</text>
  <text x="700" y="222" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:13px;">*</text>
  <text x="670" y="250" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:12px;">triggers</text>

  <!-- Patient → AppointmentHistory (1 to many) -->
  <line x1="180" y1="350" x2="180" y2="480"
    stroke="rgb(61,61,58)" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="186" y="370" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:13px;">1</text>
  <text x="186" y="465" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:13px;">*</text>
  <text x="190" y="420" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:12px;">has</text>

  <!-- Appointment → AppointmentHistory (1 to 1) -->
  <line x1="380" y1="350" x2="320" y2="550"
    stroke="rgb(61,61,58)" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="330" y="440" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:12px;">records</text>

  <!-- AIEngine → Appointment (uses) -->
  <line x1="520" y1="480" x2="520" y2="400"
    stroke="rgb(61,61,58)" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="528" y="445" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:12px;">«uses»</text>
  <text x="528" y="462" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:12px;">analyzes</text>

  <!-- AIEngine → AppointmentHistory (uses) -->
  <line x1="380" y1="600" x2="320" y2="600"
    stroke="rgb(61,61,58)" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="330" y="592" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:12px;">«uses»</text>

  <!-- NotificationService → Reminder (uses) -->
  <line x1="860" y1="480" x2="860" y2="350"
    stroke="rgb(61,61,58)" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="868" y="420" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:12px;">«uses»</text>
  <text x="868" y="437" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:12px;">sends</text>

  <!-- ══════════════════════════════════════
       LEGEND
  ══════════════════════════════════════ -->
  <rect x="40" y="780" width="1120" height="180" rx="10"
    fill="white" stroke="rgba(31,30,29,0.2)" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="60" y="808" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:16px;font-weight:700;">
    Legend
  </text>

  <!-- Association -->
  <line x1="60" y1="840" x2="120" y2="840" stroke="rgb(61,61,58)" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="130" y="845" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:14px;">
    Association (1 to many)
  </text>

  <!-- Dependency -->
  <line x1="60" y1="880" x2="120" y2="880" stroke="rgb(61,61,58)" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="130" y="885" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:14px;">
    Dependency («uses»)
  </text>

  <!-- Color coding -->
  <rect x="400" y="825" width="20" height="20" rx="4" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1.2"/>
  <text x="428" y="840" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:14px;">
    Authentication / User
  </text>

  <rect x="400" y="865" width="20" height="20" rx="4" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="1.2"/>
  <text x="428" y="880" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:14px;">
    Appointment Management
  </text>

  <rect x="700" y="825" width="20" height="20" rx="4" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="1.2"/>
  <text x="728" y="840" style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:14px;">
    AI / Notification
  </text>

  <!-- Footer -->
  <text x="600" y="940" text-anchor="middle"
    style="fill:rgb(61,61,58);font-family:'Segoe UI',sans-serif;font-size:13px;">
    Class Diagram — MugangaConnect+
  </text>

</svg>
